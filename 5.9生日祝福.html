<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐</title>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background-color: #f8f8f8;
        text-align: center;
        padding: 50px;
    }

    .birthday-message {
        margin: 40px 0px;
        padding: 20px;
        background-color: #ffefd5;
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .birthday-message h1 {
        color: #ff6666;
    }

    .birthday-message p {
        color: #333;
        font-size: 1.2em;
    }

    img {
        max-width: 100%;
        height: auto;
        border-radius: 15px;
    }
</style>
</head>
<body>

<div class="birthday-message">
    <h1>生日快乐！</h1>
    <p>亲爱的，愿你的生日充满无尽的快乐，<br>愿你的每一天都闪耀着快乐的光芒！</p>
    <!-- 注意：请将'image-link.jpg'更改为您实际的图片链接 -->
    <img src="image-link.jpg" alt="生日快乐" />
</div>

</body>
</html>
